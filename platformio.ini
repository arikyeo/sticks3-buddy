[platformio]
default_envs = m5stick-s3
boards_dir = boards

; Shared settings. Version pins are exact (no ^) so builds are reproducible;
; M5GFX 0.2.22 is the floor M5Unified 0.2.17 declares in its library.json.
[common]
framework = arduino
monitor_speed = 115200
filesystem = littlefs
build_src_filter = +<*> +<buddies/>
lib_deps =
    m5stack/M5Unified @ 0.2.17
    m5stack/M5GFX @ 0.2.22
    bitbank2/AnimatedGIF @ 2.1.1
    bblanchon/ArduinoJson @ 7.4.1

; M5StickC Plus S3 (StickS3). USB flags (ARDUINO_USB_MODE=1,
; ARDUINO_USB_CDC_ON_BOOT=1) come from boards/m5stick-s3.json extra_flags —
; do not duplicate them here.
[env:m5stick-s3]
platform = espressif32@6.12.0
board = m5stick-s3
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed = 460800
board_build.filesystem = ${common.filesystem}
board_build.partitions = partitions/sticks3_8mb_ota.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
build_flags =
    -DBOARD_STICKS3
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
build_src_filter = ${common.build_src_filter}
lib_deps = ${common.lib_deps}

; M5StickC Plus (ESP32-PICO-D4, 4MB flash, AXP192 + BM8563). Same M5Unified
; source as the S3 — the HAL flag picks the backend. 160MHz keeps the
; original power budget. Single app slot: 4MB has no room for OTA.
[env:m5stickc-plus]
platform = espressif32@6.12.0
board = m5stick-c
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
board_build.filesystem = ${common.filesystem}
board_build.partitions = partitions/no_ota_4mb.csv
board_build.f_cpu = 160000000L
build_flags =
    -DBOARD_STICKC_PLUS
    -DCORE_DEBUG_LEVEL=0
build_src_filter = ${common.build_src_filter}
lib_deps = ${common.lib_deps}

; Host-side unit tests for the pure logic headers (src/logic/*). No Arduino,
; no framework — platform native uses the system GCC (present on CI ubuntu).
; build_src_filter excludes all of src/; tests reach the headers via -Isrc.
[env:native]
platform = native
test_framework = unity
build_src_filter = -<*>
build_flags = -Isrc -DBUDDY_NATIVE_TEST

; M5StickC Plus2 (ESP32-PICO-V3-02, 8MB flash, AXP2101 + BM8563). Board
; definition derived from anthropics PR #21; shares the S3's 8MB OTA table.
[env:m5stickc-plus2]
platform = espressif32@6.12.0
board = m5stickc-plus2
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
board_build.filesystem = ${common.filesystem}
board_build.partitions = partitions/sticks3_8mb_ota.csv
build_flags =
    -DBOARD_STICKC_PLUS2
    -DCORE_DEBUG_LEVEL=0
build_src_filter = ${common.build_src_filter}
lib_deps = ${common.lib_deps}
